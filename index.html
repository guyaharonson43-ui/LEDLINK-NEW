/* ── HEADER ── */
const Header = ({ cartCount, onCartOpen, onNavSelect, onNavClick, onSearchOpen }) => {

    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

    <header className={`sticky top-0 z-40 bg-white transition-shadow duration-300 ${scrolled ? 'header-scroll' : ''}`}>

/* ── SEARCH MODAL ── */
const SearchModal = ({ products, onClose, onSelect }) => {
  const [q, setQ] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    inputRef.current?.focus();
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const results = useMemo(() => {
    const s = q.trim().toLowerCase();
    if (s.length < 2) return [];
    return products.filter(p => {
      const name = (p.name || '').toLowerCase();
      const desc = (p.desc || '').toLowerCase();
      const cat  = (p.category || '').toLowerCase();
      // Match name, desc (מקט is usually in desc), or category
      return name.includes(s) || desc.includes(s) || cat.includes(s);
    }).slice(0, 30);
  }, [q, products]);

  return (
    <div className="fixed inset-0 z-50 flex flex-col" dir="rtl">
      {/* Backdrop */}

const OUTPUT_OPTIONS   = ['הכל','CV','CC'];
const POWER_RANGES     = [
  {label:'הכל',min:0,max:99999},{label:'עד 20W',min:0,max:20},
  {label:'20–60W',min:20,max:60},{label:'60–100W',min:60,max:100},

const STRIP_IP_OPTIONS    = ['הכל','IP20','IP65','IP67','IP68'];
const STRIP_TYPE_OPTIONS  = ['הכל','סטנדרט','COB','נאון','זיגזג','דיגיטלי'];
const STRIP_COLOR_OPTIONS = ['הכל','לבן','RGB','RGBW'];
const STRIP_POWER_RANGES  = [
  {label:'הכל',min:0,max:99999},{label:'עד 10W',min:0,max:10},
  {label:'10–15W',min:10,max:15},{label:'15–20W',min:15,max:20},{label:'20W+',min:20,max:99999},
];

function parseStripDesc(desc) {
  if (!desc) return {};
  const ipM = desc.match(/IP(\d+)/i);
  const wM  = desc.match(/(\d+(?:\.\d+)?)\s*W/i);
  const isRGBW = /RGBW/i.test(desc), isRGB = !isRGBW && /RGB/i.test(desc);
  return {
    ip:    ipM ? 'IP'+ipM[1] : '',
    power: wM  ? parseFloat(wM[1]) : null,
    color: isRGBW ? 'RGBW' : isRGB ? 'RGB' : 'לבן',
    type:  /COB/i.test(desc)?'COB':/נאון/.test(desc)?'נאון':/זיגזג/.test(desc)?'זיגזג':/דיגיטלי/.test(desc)?'דיגיטלי':'סטנדרט',
  };
}

/* Main filter sidebar */
const FilterSidebar = ({ products, filters, setFilters, onReset }) => {
  const { cat, ip, power, voltage, output, dimming, stripType, stripColor } = filters;
  const isPSMode    = cat === 'ספקי מתח';
  const isStripMode = cat === 'סטריפ LED - LedLink';

  /* Compute counts per category against current NON-category filters */
  const catCounts = {};
  CATS_LIST.forEach(c => {
    catCounts[c] = products.filter(p => p.category === c).length;
  });

  /* Compute counts for IP options from current category subset */
  const catProds = cat === 'הכל' ? products : products.filter(p => p.category === cat);

  function getIpOf(p) {
    if (p.specs?.ip) return p.specs.ip;
    const m = (p.desc||'').match(/IP(\d+)/i); return m ? 'IP'+m[1] : null;
  }
  const ipCounts = {};
  IP_OPTIONS.slice(1).forEach(v => { ipCounts[v] = catProds.filter(p => getIpOf(p) === v).length; });

  /* Power counts */
  function getPowerOf(p) {
    if (p.specs?.power) return parseFloat(p.specs.power);
    const m = (p.desc||'').match(/(\d+(?:\.\d+)?)\s*W/i); return m ? parseFloat(m[1]) : null;
  }
  const powerCounts = {};
  POWER_RANGES.slice(1).forEach(r => {
    powerCounts[r.label] = catProds.filter(p => { const w = getPowerOf(p); return w !== null && w >= r.min && w <= r.max; }).length;
  });

  /* PS-specific counts */
  const vCounts={}, oCounts={}, dCounts={};
  if (isPSMode) {
    VOLTAGE_OPTIONS.slice(1).forEach(v => { vCounts[v] = catProds.filter(p => p.specs?.voltage === v).length; });
    OUTPUT_OPTIONS.slice(1).forEach(v => { oCounts[v] = catProds.filter(p => p.specs?.outputMode === v).length; });
    DIMMING_OPTIONS.slice(1).forEach(v => { dCounts[v] = catProds.filter(p => (p.specs?.dimming||[]).includes(v)).length; });
  }

  /* Strip-specific counts */
  const stTypeCounts={}, stColorCounts={};
  if (isStripMode) {
    STRIP_TYPE_OPTIONS.slice(1).forEach(v => { stTypeCounts[v] = catProds.filter(p => parseStripDesc(p.desc).type === v).length; });
    STRIP_COLOR_OPTIONS.slice(1).forEach(v => { stColorCounts[v] = catProds.filter(p => parseStripDesc(p.desc).color === v).length; });
  }

  const hasActive = cat !== 'הכל' || ip !== 'הכל' || power !== 'הכל' || voltage !== 'הכל' || output !== 'הכל' || dimming !== 'הכל' || stripType !== 'הכל' || stripColor !== 'הכל';

  const set = (k, v) => setFilters(f => ({...f, [k]: f[k] === v ? 'הכל' : v}));

  return (
    <div className="bg-white rounded-lg border border-border p-5 sticky top-20">
      {/* Header */}
      <div className="flex justify-between items-center mb-4 pb-3 border-b border-border">
        <h3 className="font-heading font-black text-base text-ink flex items-center gap-2">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8973A" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          סינון
        </h3>
        {hasActive && (
          <button onClick={onReset} className="text-xs text-gold hover:text-gold-dark font-bold transition-colors">
            נקה הכל ✕
          </button>
        )}
      </div>

      {/* Category */}
      <FilterSection title="קטגוריה" defaultOpen={true}>
        <FilterRow label="הכל" count={products.length} active={cat==='הכל'} onClick={() => setFilters(f=>({...f,cat:'הכל'}))}/>
        {CATS_LIST.filter(c => catCounts[c] > 0).map(c => (
          <FilterRow key={c} label={c} count={catCounts[c]} active={cat===c}
            onClick={() => setFilters(f=>({...f, cat: f.cat===c ? 'הכל' : c}))}/>
        ))}
      </FilterSection>

      {/* IP Rating */}
      <FilterSection title="הגנת מים (IP)" defaultOpen={false}>
        {IP_OPTIONS.slice(1).filter(v => (ipCounts[v]||0) > 0).map(v => (
          <FilterRow key={v} label={v} count={ipCounts[v]} active={ip===v} onClick={() => set('ip', v)}/>
        ))}
      </FilterSection>

      {/* Power */}
      <FilterSection title="הספק" defaultOpen={false}>
        {POWER_RANGES.slice(1).filter(r => (powerCounts[r.label]||0) > 0).map(r => (
          <FilterRow key={r.label} label={r.label} count={powerCounts[r.label]} active={power===r.label}
            onClick={() => set('power', r.label)}/>
        ))}
      </FilterSection>

      {/* PS-specific */}
      {isPSMode && (<>
        <FilterSection title="מתח יציאה (Voltage)" defaultOpen={true}>
          {VOLTAGE_OPTIONS.slice(1).filter(v => (vCounts[v]||0) > 0).map(v => (
            <FilterRow key={v} label={v} count={vCounts[v]} active={voltage===v} onClick={() => set('voltage', v)}/>
          ))}
        </FilterSection>
        <FilterSection title="סוג יציאה (Output)" defaultOpen={true}>
          {OUTPUT_OPTIONS.slice(1).filter(v => (oCounts[v]||0) > 0).map(v => (
            <FilterRow key={v} label={v} count={oCounts[v]} active={output===v} onClick={() => set('output', v)}/>
          ))}
        </FilterSection>
        <FilterSection title="עמעום (Dimming)" defaultOpen={false}>
          {DIMMING_OPTIONS.slice(1).filter(v => (dCounts[v]||0) > 0).map(v => (
            <FilterRow key={v} label={v} count={dCounts[v]} active={dimming===v} onClick={() => set('dimming', v)}/>
          ))}
        </FilterSection>
      </>)}

      {/* Strip-specific */}
      {isStripMode && (<>
        <FilterSection title="סוג סטריפ" defaultOpen={true}>
          {STRIP_TYPE_OPTIONS.slice(1).filter(v => (stTypeCounts[v]||0) > 0).map(v => (
            <FilterRow key={v} label={v} count={stTypeCounts[v]} active={stripType===v} onClick={() => set('stripType', v)}/>
          ))}
        </FilterSection>
        <FilterSection title="גוון אור" defaultOpen={true}>
          {STRIP_COLOR_OPTIONS.slice(1).filter(v => (stColorCounts[v]||0) > 0).map(v => (
            <FilterRow key={v} label={v} count={stColorCounts[v]} active={stripColor===v} onClick={() => set('stripColor', v)}/>
          ))}
        </FilterSection>
      </>)}
    </div>
  );
};

const INIT_STRIP = { ip:'הכל', type:'הכל', color:'הכל', power:'הכל' };

    if (isPSMode) {

        const raw = p.specs?.power || (p.desc||'').match(/(\d+(?:\.\d+)?)\s*W/i)?.[1];
        const w = parseFloat(raw);
        if (isNaN(w) || w < range.min || w > range.max) return false;
      }
      if (voltage !== 'הכל' && p.specs?.voltage !== voltage) return false;
      if (output  !== 'הכל' && p.specs?.outputMode !== output) return false;
      if (dimming !== 'הכל' && !(p.specs?.dimming||[]).includes(dimming)) return false;

    if (isStripMode) {

      if (type  !== 'הכל' && s.type  !== type)  return false;
      if (color !== 'הכל' && s.color !== color) return false;
    }
    return true;
  }

/* Categories that are legitimately outdoor/garden */
const OUTDOOR_CATS = ['דוקרני גינה','עמודוני חוץ','צמודי קיר חוץ','שקועי קיר חוץ','צמודי תקרה חוץ','תלויים חוץ','שקועי רצפה חוץ','תאורה סולארית'];

/* Keywords that identify non-residential fixtures hidden inside residential categories
   (e.g. LINDA is 'צמוד תקרה' but its desc says "חניונים תת קרקעיים וחדרי ממ״ד") */
const NON_RESIDENTIAL_KEYWORDS = [
  'חניון', 'חניונים',
  'ממ״ד', 'ממ"ד', 'מקלט',
  'מחסן', 'מחסנים',
  'מפעל', 'מפעלים', 'תעשיי', 'תעשייתי',

  'שטחים ציבוריים',
  'חלונות ראווה', 'אולמות תצוגה', 'מוזיאונים',
];

/* A product is "non-residential" if it's in an INDOOR category but its desc targets
   industrial/commercial/public spaces. Outdoor categories are exempt. */
const isNonResidential = (p) => {
  if (OUTDOOR_CATS.includes(p.category)) return false; /* outdoor fixtures are legit */
  const txt = (p.desc || '') + ' ' + (p.name || '');
  return NON_RESIDENTIAL_KEYWORDS.some(kw => txt.includes(kw));
};

/* Categories whose prod.img is a technical schematic / aluminum extrusion drawing —
   replace with lifestyle photo. All OTHER categories (fixtures from QLT etc.)
   keep their original prod.img which is a proper product photo. */
const SCHEMATIC_CATS = new Set(['פרופילים', 'סטריפ LED - LedLink', 'ספקי מתח']);

/* Detects whether a product image URL is a technical schematic (not a real photo).
   Epsilon uses "-ps-" in the filename for plan/schematic images. */
const isSchematicImg = (url) => !url || !url.trim() || url.includes('-ps-');

/* Returns the display image for a product card / modal hero.
   - Profiles & strips        → lifestyle Unsplash (prod.img = technical drawing)
   - Fixtures with real photo → prod.img as-is (epsilon real photo, not ps)
   - Fixtures with schematic or empty img → lifestyle Unsplash for that category */
const catalogImg = (p, idx = 0) => {
  const fallback = CATEGORY_LIFESTYLE_IMG[p.category] || PROFILE_AMBIENT[idx % PROFILE_AMBIENT.length];
  if (!SCHEMATIC_CATS.has(p.category)) {
    /* Use real product photo only when it exists and is NOT a schematic */
    return isSchematicImg(p.img) ? fallback : p.img;
  }
  /* Profile / strip → always lifestyle */
  if (p.category === 'פרופילים') {
    const img = homeImg(p, idx);
    return img || CATEGORY_LIFESTYLE_IMG['פרופילים'] || PROFILE_AMBIENT[idx % PROFILE_AMBIENT.length];
  }
  return CATEGORY_LIFESTYLE_IMG[p.category] || PROFILE_AMBIENT[idx % PROFILE_AMBIENT.length];
};

/* Profiles that should NOT appear in certain rooms
   מוגן מים = waterproof → relevant only in kitchen/bathroom/outdoor, not living/sleeping areas */
const PROFILE_ROOM_SKIP = {
  'salon':   ['מוגן מים'],
  'bedroom': ['מוגן מים'],
  'kids':    ['מוגן מים'],
  'entry':   ['מוגן מים'],
  /* kitchen keeps מוגן מים — ideal for under-cabinet/wet areas */
};

/* Returns the display image for a product in home mode.
   Priority: product-specific image → room context → type keyword → ambient fallback */
const homeImg = (p, idx, roomId = 'all') => {
  if (p.category !== 'פרופילים') return p.img;
  /* 1. If product has a custom SVG scene, return null — render path handles it */
  if (PRODUCT_SCENE[p.name]) return null;
  /* 2. If a specific room is selected, use the room's context image */
  if (roomId !== 'all' && PROFILE_BY_ROOM[roomId]) return PROFILE_BY_ROOM[roomId];
  /* 3. Try to match product name to a specific installation type */
  for (const [keyword, url] of Object.entries(PROFILE_BY_TYPE)) {
    if ((p.name || '').includes(keyword)) return url;
  }
  /* 4. Fallback: rotate through architectural LED scenes */
  return PROFILE_AMBIENT[idx % PROFILE_AMBIENT.length];
};

/* ── PDF Generator ── */
function generateRecipePDF(roomLabel, moodLabel, recipe) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
  const W = 210, M = 20;

  // Header
  doc.setFillColor(26,26,26);
  doc.rect(0,0,W,45,'F');
  doc.setFillColor(184,151,58);
  doc.rect(0,45,W,3,'F');

  doc.setTextColor(184,151,58);
  doc.setFontSize(12);
  doc.text('LEDLINK', W-M, 18, {align:'right'});
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);
  doc.text(recipe.title, W-M, 32, {align:'right'});
  doc.setFontSize(10);
  doc.setTextColor(200,200,200);
  doc.text(roomLabel + ' | ' + moodLabel, W-M, 40, {align:'right'});

  let y = 60;

  // Color temp
  doc.setFillColor(255,248,235);
  doc.roundedRect(M, y, W-2*M, 18, 3, 3, 'F');
  doc.setTextColor(100,100,100);
  doc.setFontSize(8);
  doc.text('COLOR TEMPERATURE', M+5, y+6);
  doc.setTextColor(26,26,26);
  doc.setFontSize(14);
  doc.text(recipe.temp, M+5, y+14);
  y += 25;

  // Layers
  doc.setTextColor(100,100,100);
  doc.setFontSize(8);
  doc.text('LIGHTING LAYERS', M, y);
  y += 8;

  recipe.layers.forEach(layer => {
    doc.setFillColor(247,246,244);
    doc.roundedRect(M, y, W-2*M, 22, 3, 3, 'F');
    doc.setTextColor(26,26,26);
    doc.setFontSize(11);
    doc.text(layer.name, W-M-5, y+8, {align:'right'});
    doc.setTextColor(80,80,80);
    doc.setFontSize(8);
    const descLines = doc.splitTextToSize(layer.desc, W-2*M-15);
    doc.text(descLines, W-M-5, y+14, {align:'right'});
    doc.setFillColor(26,26,26);
    doc.roundedRect(M+3, y+4, doc.getTextWidth(layer.product)+6, 7, 2, 2, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(7);
    doc.text(layer.product, M+6, y+9);
    y += 28;
  });

  // Estimate
  y += 5;
  doc.setFillColor(247,246,244);
  doc.roundedRect(M, y, W-2*M, 18, 3, 3, 'F');
  doc.setTextColor(100,100,100);
  doc.setFontSize(8);
  doc.text('ESTIMATED QUANTITIES', M+5, y+6);
  doc.setTextColor(26,26,26);
  doc.setFontSize(10);
  doc.text(recipe.estimate, M+5, y+14);
  y += 28;

  // Footer CTA
  doc.setFillColor(26,26,26);
  doc.roundedRect(M, y, W-2*M, 30, 3, 3, 'F');
  doc.setTextColor(184,151,58);
  doc.setFontSize(9);
  doc.text('LEDLINK.CO.IL', W/2, y+8, {align:'center'});
  doc.setTextColor(255,255,255);
  doc.setFontSize(12);
  doc.text('WhatsApp: 050-472-2550', W/2, y+17, {align:'center'});
  doc.setTextColor(180,180,180);
  doc.setFontSize(8);
  doc.text('Yetzira 19, Rehovot', W/2, y+24, {align:'center'});

  doc.save('LedLink-' + roomLabel + '-' + moodLabel + '.pdf');
}

/* ── Share URL helpers ── */
function getShareUrl(room, mood) {
  const base = window.location.origin + window.location.pathname;
  return base + '?r=' + encodeURIComponent(room) + '&m=' + encodeURIComponent(mood);
}
function readShareParams() {
  const p = new URLSearchParams(window.location.search);
  return { room: p.get('r'), mood: p.get('m') };
}

/* ── SCROLL TO TOP ── */
const ScrollToTop = () => {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 700);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <button
      onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      aria-label="חזרה לראש הדף"
      style={{ opacity: show ? 1 : 0, pointerEvents: show ? 'auto' : 'none', bottom: '96px', left: '28px' }}
      className="fixed z-[998] w-12 h-12 rounded-full bg-ink/90 backdrop-blur-sm text-white flex items-center justify-center shadow-xl hover:bg-gold transition-all duration-300 hover:scale-110 hover:-translate-y-1"

    </button>
  );
};

/* ── APP ── */
const App = () => {
  const [products, setProducts] = useState([]);
  const [cart, setCart]         = useState([]);
  const [cartOpen, setCartOpen]     = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [selected, setSelected]     = useState(null);
  const [navCat, setNavCat]     = useState(null);
  const [siteMode, setSiteMode] = useState(null); // null | 'home' | 'pro'
  const [showGuides, setShowGuides] = useState(false);

  useEffect(() => {
    Promise.all([
      fetch('products.json').then(r=>r.json()),
      fetch('qlt_products.json').then(r=>r.json()).catch(()=>[]),
    ]).then(([a,b]) => {
      setProducts([...a,...b].map(p=>({...p, name:cleanName(p.name)})));
    });
  }, []);

  const addToCart = item => {
    setCart(prev => {
      const ex = prev.find(p => p.id === item.id);
      return ex ? prev.map(p => p.id===item.id ? {...p,qty:p.qty+1} : p) : [...prev,{...item,qty:1}];
    });
    setTimeout(() => setCartOpen(true), 500);
  };

  const scrollToCatalog = () => setTimeout(() => {
    document.getElementById('catalog')?.scrollIntoView({ behavior: 'smooth' });
  }, 50);

  const handleHome = () => { setSiteMode('home'); setTimeout(() => document.getElementById('home-catalog')?.scrollIntoView({ behavior: 'smooth' }), 50); };
  const handlePro  = () => { setSiteMode('pro');  scrollToCatalog(); };

  const handleNavSelect = cat => {
    setSiteMode('pro');
    setNavCat(cat);
    scrollToCatalog();
  };

  const handleNavClick = item => {
    if (item.anchor === '#guides') {
      setShowGuides(true);
    } else if (item.anchor) {
      setTimeout(() => document.querySelector(item.anchor)?.scrollIntoView({ behavior: 'smooth' }), 50);
    } else {
      handleNavSelect(item.label);
    }
  };

  return (
    <div className="w-full min-h-screen" dir="rtl">
      <TopBar/>
      <Header cartCount={cart.reduce((a,c)=>a+c.qty,0)} onCartOpen={() => setCartOpen(true)} onSearchOpen={() => setSearchOpen(true)} onNavSelect={handleNavSelect} onNavClick={handleNavClick}/>

      <main>
        <Hero onHome={handleHome} onPro={handlePro}/>
        <TrustBar/>
        <FactorySection/>
        <AboutSection/>
        <TestimonialsSection/>
        <ProjectsSection/>
        <BrandsSection/>

        {siteMode === 'home'
          ? <HomeCatalog products={products} onSwitchPro={handlePro}/>
          : <Catalog products={products} onAddToCart={addToCart} onSelect={setSelected} initCat={navCat}/>
        }

        <ContactSection/>
      </main>

      <GuidesModal open={showGuides} onClose={() => setShowGuides(false)}/>
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} cart={cart}/>
      {selected && <ProductModal prod={selected} onClose={() => setSelected(null)} onAddToCart={addToCart}/>}
      {searchOpen && <SearchModal products={products} onClose={() => setSearchOpen(false)} onSelect={p => { setSelected(p); setSearchOpen(false); }}/>}
